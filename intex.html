<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universo para Dani ❤️</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #050510; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas { 
            display: block; 
            width: 100vw; 
            height: 100vh; 
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* Capa de mensajes estelares corregida y estilizada */
        #capa-estelar-texto {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #ffffff;
            pointer-events: none; /* Permite tocar las estrellas interactivas detrás del texto */
            z-index: 10;
        }
        .texto-galactico {
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 2.5s ease, transform 2.5s ease;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.9), 0 0 40px rgba(141, 99, 255, 0.7), 0 0 60px rgba(255, 45, 85, 0.5);
        }
        #nombre-dani {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 6px;
            margin-bottom: 15px;
        }
        #mensaje-cumple {
            font-size: 2rem;
            font-weight: 600;
            color: #fff6e0;
            text-shadow: 0 0 20px rgba(255, 246, 224, 0.9), 0 0 40px rgba(255, 45, 85, 0.7);
        }

        /* Tu pantalla de carga original */
        #loader {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: #050510; 
            color: white; 
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            z-index: 999;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="loader">🌌 ARMANDO EL UNIVERSO...</div>
    
    <div id="capa-estelar-texto">
        <div id="nombre-dani" class="texto-galactico">Dani</div>
        <div id="mensaje-cumple" class="texto-galactico">¡Feliz Cumpleaños!</div>
    </div>

    <canvas id="universo"></canvas>
    <script src="main.js"></script>
</body>
</html>
